<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlashStage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           SlashStage — Console Design System
           Inspired by Linear / Vercel / Raycast
           ═══════════════════════════════════════════ */

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Background layers — subtle depth */
            --bg-base: #0d1117;
            --bg-raised: #161b22;
            --bg-overlay: #1c2128;
            --bg-hover: #21262d;

            /* Text hierarchy */
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
            --text-tertiary: #484f58;
            --text-link: #58a6ff;

            /* Accent palette — restrained and warm */
            --accent: #58a6ff;
            --accent-subtle: rgba(88, 166, 255, 0.10);
            --green: #3fb950;
            --green-subtle: rgba(63, 185, 80, 0.10);
            --yellow: #d29922;
            --yellow-subtle: rgba(210, 153, 34, 0.10);
            --purple: #a371f7;
            --purple-subtle: rgba(163, 113, 247, 0.10);
            --red: #f85149;
            --orange: #d18616;

            /* Elevation — shadows instead of borders */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 3px 12px rgba(0,0,0,0.35);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
            --shadow-hover: 0 6px 20px rgba(0,0,0,0.45);

            /* Border — minimal use */
            --border-default: #30363d;
            --border-muted: #21262d;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-muted);
            margin: 0 -24px;
            padding: 0 24px;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .brand {
            display: flex; align-items: center; gap: 8px;
            font-size: 15px; font-weight: 700; color: var(--text-primary);
            text-decoration: none; cursor: pointer; letter-spacing: -0.3px;
        }
        .brand:hover { color: var(--accent); }
        .brand svg { width: 20px; height: 20px; }

        /* Breadcrumb (inline in header) */
        .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-tertiary); }
        .breadcrumb a { color: var(--text-secondary); text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { color: var(--text-primary); }
        .breadcrumb .sep { font-size: 11px; }
        .breadcrumb .current { color: var(--text-primary); font-weight: 500; }

        .header-right { display: flex; align-items: center; gap: 8px; }

        /* ─── Buttons ─── */
        .btn {
            height: 32px; padding: 0 12px; border-radius: var(--radius-sm);
            border: 1px solid var(--border-default); background: var(--bg-raised);
            color: var(--text-secondary); cursor: pointer;
            font-size: 12px; font-weight: 500; font-family: inherit;
            display: inline-flex; align-items: center; gap: 5px;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .btn:hover { color: var(--text-primary); border-color: var(--text-tertiary); background: var(--bg-overlay); }
        .btn-accent {
            background: var(--accent); border-color: var(--accent);
            color: #fff; font-weight: 600;
        }
        .btn-accent:hover { opacity: 0.92; background: #4c94e8; border-color: #4c94e8; }

        /* ─── Main Content ─── */
        .main { padding: 24px 0 48px; }

        /* ─── Stats Bar (compact, not cards) ─── */
        .stats-bar {
            display: flex; align-items: center; gap: 24px;
            padding: 12px 0; margin-bottom: 24px;
            border-bottom: 1px solid var(--border-muted);
            font-size: 13px;
        }
        .stat-item { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
        .stat-item .stat-num {
            font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums;
        }
        .stat-item .stat-num.blue { color: var(--accent); }
        .stat-item .stat-num.green { color: var(--green); }
        .stat-item .stat-num.dim { color: var(--text-tertiary); }
        .stat-item .stat-label { color: var(--text-tertiary); font-size: 12px; }

        /* ─── Search ─── */
        .search-container { margin-bottom: 20px; }
        .search-input {
            width: 100%; height: 36px;
            padding: 0 12px 0 34px;
            background: var(--bg-raised); border: 1px solid var(--border-muted);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-size: 13px; font-family: inherit; outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-subtle); }
        .search-input::placeholder { color: var(--text-tertiary); }
        .search-wrap { position: relative; }
        .search-icon {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            color: var(--text-tertiary); font-size: 13px; pointer-events: none;
        }

        /* ─── Section Header ─── */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            display: flex; align-items: center; gap: 8px;
        }
        .section-count {
            font-size: 11px; font-weight: 500;
            color: var(--text-tertiary); background: var(--bg-overlay);
            padding: 2px 8px; border-radius: 10px;
        }

        /* ─── Project Cards ─── */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
        }
        .project-card {
            background: var(--bg-raised);
            border: 1px solid var(--border-muted);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.2s;
        }
        .project-card:hover {
            background: var(--bg-overlay);
            border-color: var(--border-default);
            box-shadow: var(--shadow-md);
        }
        .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
        .card-name {
            font-size: 14px; font-weight: 600; color: var(--text-primary);
            line-height: 1.3; flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .card-badge {
            font-size: 11px; font-weight: 600; padding: 2px 8px;
            border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-left: 10px;
        }
        .card-badge.multi { background: var(--accent-subtle); color: var(--accent); }
        .card-badge.single { background: var(--bg-overlay); color: var(--text-secondary); }
        .card-path {
            font-size: 11px; color: var(--text-tertiary);
            font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 10px;
        }
        .card-agents { display: flex; gap: 6px; flex-wrap: wrap; }
        .agent-pill {
            font-size: 11px; color: var(--text-secondary);
            display: inline-flex; align-items: center; gap: 4px;
        }
        .agent-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

        /* ─── Session Cards ─── */
        .session-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 10px;
        }
        .session-card {
            background: var(--bg-raised);
            border: 1px solid var(--border-muted);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.2s;
        }
        .session-card:hover {
            background: var(--bg-overlay);
            border-color: var(--border-default);
            box-shadow: var(--shadow-md);
        }
        .session-title {
            font-size: 13px; font-weight: 500; color: var(--text-primary);
            margin-bottom: 8px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .session-meta {
            display: flex; align-items: center; gap: 12px;
            font-size: 11px; color: var(--text-tertiary);
        }
        .session-meta .agent-pill { font-size: 11px; }
        .session-stats {
            display: flex; gap: 12px; margin-top: 10px; padding-top: 10px;
            border-top: 1px solid var(--border-muted);
            font-size: 12px; color: var(--text-tertiary);
        }
        .session-stats strong { color: var(--text-secondary); font-weight: 600; }

        /* ─── Messages ─── */
        .messages-list { display: flex; flex-direction: column; gap: 6px; }
        .msg-item {
            background: var(--bg-raised);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border-left: 2px solid transparent;
        }
        .msg-item.user { border-left-color: var(--accent); }
        .msg-item.assistant { border-left-color: var(--green); }
        .msg-item.tool { border-left-color: var(--yellow); }
        .msg-head {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 6px; font-size: 11px;
        }
        .msg-role-tag {
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.3px; font-size: 10px;
            padding: 1px 6px; border-radius: 3px;
        }
        .msg-role-tag.user { color: var(--accent); background: var(--accent-subtle); }
        .msg-role-tag.assistant { color: var(--green); background: var(--green-subtle); }
        .msg-role-tag.tool { color: var(--yellow); background: var(--yellow-subtle); }
        .msg-time { color: var(--text-tertiary); margin-left: auto; font-size: 11px; font-variant-numeric: tabular-nums; }
        .msg-tool-name {
            font-size: 11px; color: var(--yellow);
            font-family: monospace; margin-bottom: 4px;
        }
        .msg-body {
            font-size: 13px; line-height: 1.6; color: var(--text-secondary);
            white-space: pre-wrap; word-break: break-word;
            max-height: 400px; overflow-y: auto;
        }

        /* Sort toggle */
        .sort-bar {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 12px; font-size: 12px; color: var(--text-tertiary);
        }
        .sort-btn {
            font-size: 11px; padding: 3px 8px; border-radius: 4px;
            border: 1px solid var(--border-muted); background: transparent;
            color: var(--text-tertiary); cursor: pointer; font-family: inherit;
            transition: all 0.15s;
        }
        .sort-btn:hover { color: var(--text-secondary); border-color: var(--border-default); }
        .sort-btn.on { color: var(--accent); background: var(--accent-subtle); border-color: transparent; }

        /* ─── Search Results ─── */
        .results-list { display: flex; flex-direction: column; gap: 8px; }
        .result-item {
            background: var(--bg-raised); border: 1px solid var(--border-muted);
            border-radius: var(--radius-sm); padding: 12px 14px;
            cursor: pointer; transition: background 0.15s, border-color 0.15s;
        }
        .result-item:hover { background: var(--bg-overlay); border-color: var(--border-default); }
        .result-meta { font-size: 11px; color: var(--text-tertiary); display: flex; gap: 8px; margin-bottom: 6px; }
        .result-content { font-size: 12px; color: var(--text-tertiary); line-height: 1.5; max-height: 60px; overflow: hidden; }

        /* ─── Loading / Empty ─── */
        .loading-state { text-align: center; padding: 48px 0; color: var(--text-tertiary); }
        .spinner {
            width: 20px; height: 20px; margin: 0 auto 12px;
            border: 2px solid var(--border-default); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state {
            text-align: center; padding: 48px 0; color: var(--text-tertiary);
        }
        .empty-state p { margin-bottom: 12px; font-size: 13px; }

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }

        /* ─── View transition ─── */
        .view { animation: viewIn 0.18s ease-out; }
        @keyframes viewIn { from { opacity: 0; } to { opacity: 1; } }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .app { padding: 0 16px; }
            .header { margin: 0 -16px; padding: 0 16px; }
            .project-grid, .session-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-wrap: wrap; gap: 14px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <a class="brand" onclick="navigateTo('home')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    SlashStage
                </a>
                <div id="breadcrumb" class="breadcrumb"></div>
            </div>
            <div class="header-right">
                <button class="btn" onclick="doScan()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Scan
                </button>
                <button class="btn btn-accent" onclick="addProject()">+ New</button>
            </div>
        </div>

        <div class="main" id="main"></div>
    </div>

    <script>
        const API = '/api';
        let projectsCache = [];
        let messageOrder = 'desc';
        let lastSessionInfo = null;

        // ── Agent config ──
        const agentColor = { 'cursor-ide':'#3fb950','cursor-cli':'#58a6ff','claude-code':'#d18616','codex-cli':'#a371f7','gemini-cli':'#d29922','opencode':'#f85149','copilot-cli':'#58a6ff' };

        function dot(agent) { return '<span class="agent-dot" style="background:' + (agentColor[agent]||'#484f58') + '"></span>'; }
        function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

        // ── Date formatting ──
        function fmtDate(s) {
            if (!s) return '';
            const d = new Date(s);
            if (isNaN(d)) return '';
            return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
        }
        function fmtShort(s) {
            if (!s) return '';
            const d = new Date(s);
            if (isNaN(d)) return '';
            return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
        }
        function p(n) { return String(n).padStart(2,'0'); }

        // ══════════════════════════════════════
        // ── History API Navigation ──
        // ══════════════════════════════════════
        function navigateTo(view, data) {
            const state = { view, data };
            const hash = hashFor(view, data);
            history.pushState(state, '', hash);
            render(view, data);
        }

        // Replace current state (for initial load, don't push)
        function navigateReplace(view, data) {
            const state = { view, data };
            const hash = hashFor(view, data);
            history.replaceState(state, '', hash);
            render(view, data);
        }

        function hashFor(view, data) {
            if (view === 'home') return '#/';
            if (view === 'project' && data) return '#/p/' + data.id;
            if (view === 'session' && data) return '#/s/' + data.id;
            if (view === 'search' && data) return '#/search?q=' + encodeURIComponent(data.query);
            return '#/';
        }

        // Browser back/forward
        window.addEventListener('popstate', function(e) {
            if (e.state) {
                render(e.state.view, e.state.data);
            } else {
                render('home');
            }
        });

        // ── Render dispatcher ──
        function render(view, data) {
            const main = document.getElementById('main');
            const bc = document.getElementById('breadcrumb');

            if (view === 'home') {
                bc.innerHTML = '';
                renderHome(main);
            } else if (view === 'project') {
                bc.innerHTML = '<span class="sep">/</span><a onclick="navigateTo(\'home\')">Projects</a><span class="sep">/</span><span class="current">' + esc(data.name) + '</span>';
                renderProject(main, data);
            } else if (view === 'session') {
                let projPart = '';
                if (data._projectName) {
                    projPart = '<span class="sep">/</span><a onclick="navigateTo(\'home\')">Projects</a><span class="sep">/</span>' +
                        (data._projectId ? '<a onclick="goToProject(' + data._projectId + ')">' + esc(data._projectName) + '</a>' : '<span>' + esc(data._projectName) + '</span>') +
                        '<span class="sep">/</span>';
                } else {
                    projPart = '<span class="sep">/</span><a onclick="navigateTo(\'home\')">Projects</a><span class="sep">/</span>';
                }
                bc.innerHTML = projPart + '<span class="current">' + esc(data.title || 'Session') + '</span>';
                renderSession(main, data);
            } else if (view === 'search') {
                bc.innerHTML = '<span class="sep">/</span><a onclick="navigateTo(\'home\')">Projects</a><span class="sep">/</span><span class="current">Search</span>';
                renderSearch(main, data);
            }
        }

        function goToProject(pid) {
            const proj = projectsCache.find(p => p.id === pid);
            if (proj) navigateTo('project', proj);
        }

        // ══════════════════════════════════════
        // ── Home View ──
        // ══════════════════════════════════════
        async function renderHome(el) {
            el.innerHTML = '<div class="view">' +
                '<div class="stats-bar" id="hstats"></div>' +
                '<div class="search-container"><div class="search-wrap"><span class="search-icon">⌕</span><input class="search-input" id="search-input" type="text" placeholder="Search sessions and messages..." onkeyup="if(event.key===\'Enter\')doSearch(this.value)"></div></div>' +
                '<div class="section-header"><div class="section-title">Projects <span class="section-count" id="proj-count">…</span></div></div>' +
                '<div class="project-grid" id="pgrid"><div class="loading-state"><div class="spinner"></div><p>Loading…</p></div></div>' +
                '</div>';

            await Promise.all([loadHomeStats(), loadProjects()]);
        }

        async function loadHomeStats() {
            try {
                const r = await fetch(API + '/stats');
                const d = await r.json();
                const el = document.getElementById('hstats');
                if (!el) return;
                el.innerHTML =
                    '<div class="stat-item"><span class="stat-num blue">' + (d.total_projects||0) + '</span><span class="stat-label">projects</span></div>' +
                    '<div class="stat-item"><span class="stat-num green">' + (d.total_sessions||0) + '</span><span class="stat-label">sessions</span></div>' +
                    '<div class="stat-item"><span class="stat-num dim">' + (d.unassigned_sessions||0) + '</span><span class="stat-label">unlinked</span></div>';
            } catch(e) { console.error(e); }
        }

        async function loadProjects() {
            try {
                const r = await fetch(API + '/projects');
                projectsCache = await r.json();
                const grid = document.getElementById('pgrid');
                const countEl = document.getElementById('proj-count');
                if (!grid) return;
                if (countEl) countEl.textContent = projectsCache.length;

                if (!projectsCache || projectsCache.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><p>No projects yet</p><button class="btn btn-accent" onclick="doScan()">Scan for sessions</button></div>';
                    return;
                }

                projectsCache.sort((a,b) => (b.total_sessions||0) - (a.total_sessions||0));

                grid.innerHTML = projectsCache.map((proj, i) => {
                    const agents = Object.keys(proj.sessions_by_agent||{}).map(a =>
                        '<span class="agent-pill">' + dot(a) + ' ' + a + '</span>'
                    ).join('');
                    const n = proj.total_sessions||0;
                    const cls = n > 1 ? 'multi' : 'single';

                    return '<div class="project-card" onclick="navigateTo(\'project\', projectsCache[' + i + '])">' +
                        '<div class="card-top">' +
                            '<span class="card-name">' + esc(proj.name) + '</span>' +
                            '<span class="card-badge ' + cls + '">' + n + '</span>' +
                        '</div>' +
                        '<div class="card-path">' + esc(proj.path) + '</div>' +
                        '<div class="card-agents">' + agents + '</div>' +
                        '</div>';
                }).join('');
            } catch(e) { console.error(e); }
        }

        // ══════════════════════════════════════
        // ── Project View ──
        // ══════════════════════════════════════
        async function renderProject(el, project) {
            el.innerHTML = '<div class="view">' +
                '<div class="stats-bar" id="pstats"></div>' +
                '<div class="section-header"><div class="section-title">Sessions</div></div>' +
                '<div class="session-grid" id="sgrid"><div class="loading-state"><div class="spinner"></div><p>Loading…</p></div></div>' +
                '</div>';

            try {
                const r = await fetch(API + '/projects/' + project.id + '/sessions');
                const sessions = await r.json();
                const statsEl = document.getElementById('pstats');
                const grid = document.getElementById('sgrid');

                const totalMsg = (sessions||[]).reduce((s,x) => s + (x.message_count||0), 0);
                const totalTool = (sessions||[]).reduce((s,x) => s + (x.tool_calls||0), 0);
                statsEl.innerHTML =
                    '<div class="stat-item"><span class="stat-num blue">' + (sessions?sessions.length:0) + '</span><span class="stat-label">sessions</span></div>' +
                    '<div class="stat-item"><span class="stat-num green">' + totalMsg + '</span><span class="stat-label">messages</span></div>' +
                    '<div class="stat-item"><span class="stat-num dim">' + totalTool + '</span><span class="stat-label">tool calls</span></div>';

                if (!sessions || sessions.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><p>No sessions</p></div>';
                    return;
                }

                grid.innerHTML = sessions.map(s => {
                    const sData = JSON.stringify({
                        id: s.id, title: s.title || s.id,
                        _projectName: project.name, _projectId: project.id
                    }).replace(/\\/g,'\\\\').replace(/'/g,"\\'");

                    return '<div class="session-card" onclick=\'navigateTo("session", ' + sData + ')\'>' +
                        '<div class="session-title">' + esc(s.title || s.id || 'Untitled') + '</div>' +
                        '<div class="session-meta">' +
                            '<span class="agent-pill">' + dot(s.agent_type) + ' ' + esc(s.agent_type||'') + '</span>' +
                            (s.start_time ? '<span>' + fmtShort(s.start_time) + '</span>' : '') +
                        '</div>' +
                        '<div class="session-stats">' +
                            '<span><strong>' + (s.message_count||0) + '</strong> msgs</span>' +
                            '<span><strong>' + (s.tool_calls||0) + '</strong> tools</span>' +
                        '</div>' +
                        '</div>';
                }).join('');
            } catch(e) {
                console.error(e);
                el.innerHTML = '<div class="empty-state"><p>Failed to load sessions</p></div>';
            }
        }

        // ══════════════════════════════════════
        // ── Session / Messages View ──
        // ══════════════════════════════════════
        async function renderSession(el, info) {
            lastSessionInfo = info;
            el.innerHTML = '<div class="view"><div class="loading-state"><div class="spinner"></div><p>Loading…</p></div></div>';

            try {
                const r = await fetch(API + '/sessions/' + info.id + '/messages');
                let msgs = await r.json();

                if (!msgs || msgs.length === 0) {
                    el.innerHTML = '<div class="view"><div class="empty-state"><p>No messages</p></div></div>';
                    return;
                }

                const uN = msgs.filter(m=>m.role==='user').length;
                const aN = msgs.filter(m=>m.role==='assistant').length;
                const tN = msgs.filter(m=>m.role==='tool').length;

                const statsHTML = '<div class="stats-bar">' +
                    '<div class="stat-item"><span class="stat-num blue">' + msgs.length + '</span><span class="stat-label">messages</span></div>' +
                    '<div class="stat-item"><span class="stat-num">' + uN + '</span><span class="stat-label">user</span></div>' +
                    '<div class="stat-item"><span class="stat-num green">' + aN + '</span><span class="stat-label">assistant</span></div>' +
                    '<div class="stat-item"><span class="stat-num dim">' + tN + '</span><span class="stat-label">tool</span></div>' +
                    '</div>';

                const sortHTML = '<div class="sort-bar">' +
                    '<span>Sort:</span>' +
                    '<button class="sort-btn ' + (messageOrder==='desc'?'on':'') + '" onclick="setOrder(\'desc\')">Newest</button>' +
                    '<button class="sort-btn ' + (messageOrder==='asc'?'on':'') + '" onclick="setOrder(\'asc\')">Oldest</button>' +
                    '</div>';

                if (messageOrder === 'desc') msgs = msgs.slice().reverse();

                const msgsHTML = msgs.map(m => {
                    const ts = fmtDate(m.created_at);
                    const toolTag = m.tool_name ? '<div class="msg-tool-name">⚡ ' + esc(m.tool_name) + '</div>' : '';
                    const body = esc((m.content||'').substring(0, 4000));

                    return '<div class="msg-item ' + (m.role||'') + '">' +
                        '<div class="msg-head"><span class="msg-role-tag ' + (m.role||'') + '">' + (m.role||'?') + '</span><span class="msg-time">' + ts + '</span></div>' +
                        toolTag +
                        '<div class="msg-body">' + body + '</div>' +
                        '</div>';
                }).join('');

                el.innerHTML = '<div class="view">' + statsHTML + sortHTML + '<div class="messages-list">' + msgsHTML + '</div></div>';
            } catch(e) {
                console.error(e);
                el.innerHTML = '<div class="view"><div class="empty-state"><p>Failed to load messages</p></div></div>';
            }
        }

        function setOrder(o) {
            messageOrder = o;
            if (lastSessionInfo) renderSession(document.getElementById('main'), lastSessionInfo);
        }

        // ══════════════════════════════════════
        // ── Search ──
        // ══════════════════════════════════════
        function doSearch(q) {
            if (!q || !q.trim()) return;
            navigateTo('search', { query: q.trim() });
        }

        async function renderSearch(el, data) {
            el.innerHTML = '<div class="view"><div class="loading-state"><div class="spinner"></div><p>Searching…</p></div></div>';
            try {
                const r = await fetch(API + '/search?q=' + encodeURIComponent(data.query) + '&limit=100');
                const msgs = await r.json();

                if (!msgs || msgs.length === 0) {
                    el.innerHTML = '<div class="view"><div class="empty-state"><p>No results for "' + esc(data.query) + '"</p></div></div>';
                    return;
                }

                const items = msgs.map(m => {
                    const preview = esc((m.content||'').substring(0, 250));
                    const sData = JSON.stringify({id: m.session_id, title: m.session_id}).replace(/\\/g,'\\\\').replace(/'/g,"\\'");

                    return '<div class="result-item" onclick=\'navigateTo("session", ' + sData + ')\'>' +
                        '<div class="result-meta">' +
                            '<span class="msg-role-tag ' + (m.role||'') + '">' + esc(m.role||'') + '</span>' +
                            '<span>' + fmtShort(m.created_at) + '</span>' +
                        '</div>' +
                        '<div class="result-content">' + preview + '</div>' +
                        '</div>';
                }).join('');

                el.innerHTML = '<div class="view">' +
                    '<div class="section-header"><div class="section-title">' + msgs.length + ' results</div></div>' +
                    '<div class="results-list">' + items + '</div></div>';
            } catch(e) {
                console.error(e);
                el.innerHTML = '<div class="view"><div class="empty-state"><p>Search failed</p></div></div>';
            }
        }

        // ── Actions ──
        async function doScan() {
            const el = document.getElementById('main');
            el.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Scanning…</p></div>';
            try {
                await fetch(API + '/scan', { method: 'POST' });
                navigateTo('home');
            } catch(e) {
                console.error(e);
                el.innerHTML = '<div class="empty-state"><p>Scan failed</p></div>';
            }
        }

        async function addProject() {
            const name = prompt('Project name:');
            if (!name) return;
            const path = prompt('Project path (absolute):');
            if (!path) return;
            await fetch(API + '/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, path })
            });
            navigateTo('home');
        }

        // ── Init ──
        navigateReplace('home');
    </script>
</body>
</html>
